
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:16px;font-family:var(--font-sans);max-width:400px;margin:0 auto}
.hero{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:16px;padding:20px;margin-bottom:12px}
.hero-inner{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.icon-box{width:48px;height:48px;border-radius:14px;background:#1D9E75;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.icon-box i{color:#fff;font-size:24px}
.hero-text{}
.hero-title{font-size:15px;font-weight:500;color:var(--color-text-primary);line-height:1.3}
.hero-sub{font-size:12px;color:var(--color-text-tertiary);margin-top:2px}
.date-pill{margin-left:auto;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:20px;padding:5px 11px;font-size:11px;color:var(--color-text-secondary);text-align:center;line-height:1.5;flex-shrink:0}
.selectors{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sel-block{}
.sel-label{font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.sel-block select{width:100%;font-size:13px;padding:9px 10px;height:38px;border-radius:10px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary)}
.sel-block select:focus{outline:none;border-color:#1D9E75;box-shadow:0 0 0 2px #1D9E7518}
.role-row{display:flex;gap:6px;margin-top:2px}
.r-btn{flex:1;padding:9px 6px;border-radius:10px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);font-size:13px;font-weight:500;color:var(--color-text-secondary);cursor:pointer;transition:all .15s;text-align:center}
.r-btn.on{background:#1D9E75;border-color:#1D9E75;color:#fff}
.field-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:16px;padding:18px;margin-bottom:12px}
.field-label{font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.name-select{width:100%;font-size:14px;padding:11px 12px;height:44px;border-radius:10px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary)}
.name-select:focus{outline:none;border-color:#1D9E75;box-shadow:0 0 0 2px #1D9E7518}
.name-select:disabled{opacity:.4}
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.s-tile{border:0.5px solid var(--color-border-tertiary);border-radius:12px;padding:14px 12px;cursor:pointer;transition:all .15s;background:var(--color-background-secondary);display:flex;flex-direction:column;align-items:flex-start;gap:6px}
.s-tile:hover{border-color:var(--color-border-secondary)}
.s-tile-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.s-tile-name{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.s-tile-desc{font-size:11px;color:var(--color-text-tertiary)}
.s-tile.sel-H{background:#E1F5EE;border-color:#1D9E75}
.s-tile.sel-H .s-tile-icon{background:#1D9E7525}
.s-tile.sel-H .s-tile-name{color:#085041}
.s-tile.sel-H .s-tile-desc{color:#0F6E56}
.s-tile.sel-I{background:#E6F1FB;border-color:#378ADD}
.s-tile.sel-I .s-tile-icon{background:#378ADD25}
.s-tile.sel-I .s-tile-name{color:#042C53}
.s-tile.sel-I .s-tile-desc{color:#185FA5}
.s-tile.sel-S{background:#FAEEDA;border-color:#EF9F27}
.s-tile.sel-S .s-tile-icon{background:#EF9F2725}
.s-tile.sel-S .s-tile-name{color:#412402}
.s-tile.sel-S .s-tile-desc{color:#854F0B}
.s-tile.sel-A{background:#FCEBEB;border-color:#E24B4A}
.s-tile.sel-A .s-tile-icon{background:#E24B4A25}
.s-tile.sel-A .s-tile-name{color:#501313}
.s-tile.sel-A .s-tile-desc{color:#A32D2D}
.submit-area{margin-bottom:4px}
.prog{height:3px;background:var(--color-border-tertiary);border-radius:2px;overflow:hidden;margin-bottom:10px;display:none}
.prog-fill{height:100%;background:#1D9E75;border-radius:2px;transition:width .35s}
.msg{font-size:12px;text-align:center;padding:10px 14px;border-radius:10px;margin-bottom:10px;display:none;line-height:1.5}
.msg.ok{background:#E1F5EE;color:#085041}
.msg.err{background:#FCEBEB;color:#791F1F}
.msg.wait{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.sub-btn{width:100%;padding:14px;border-radius:12px;border:none;background:#1D9E75;color:#fff;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s}
.sub-btn:hover{opacity:.88}
.sub-btn:disabled{opacity:.45;cursor:default}
.step-dots{display:flex;justify-content:center;gap:6px;margin-bottom:16px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--color-border-secondary);transition:all .2s}
.dot.active{background:#1D9E75;width:18px;border-radius:3px}
.dot.done{background:#9FE1CB}
</style>

<h2 class="sr-only">ICT Final Project Attendance Form</h2>
<div class="wrap">

  <div class="hero">
    <div class="hero-inner">
      <div class="icon-box"><i class="ti ti-clipboard-check" aria-hidden="true"></i></div>
      <div class="hero-text">
        <div class="hero-title">ICT Final Project Attendance</div>
        <div class="hero-sub">Grade 9 &middot; Academic Year 2025/2026</div>
      </div>
      <div class="date-pill" id="datePill"></div>
    </div>

    <div class="selectors">
      <div class="sel-block">
        <div class="sel-label">Class</div>
        <select id="kelasSelect" onchange="onKelas()">
          <option value="">Select class</option>
          <option value="9A">9A</option>
          <option value="9B">9B</option>
          <option value="9C">9C</option>
          <option value="9E">9E</option>
          <option value="9F">9F</option>
        </select>
      </div>
      <div class="sel-block">
        <div class="sel-label">Filled by</div>
        <div class="role-row">
          <div class="r-btn on" id="rS" onclick="setRole('Student')">Student</div>
          <div class="r-btn" id="rP" onclick="setRole('Parent')">Parent</div>
        </div>
      </div>
    </div>
  </div>

  <div class="field-card" id="nameCard" style="opacity:.45;pointer-events:none">
    <div class="field-label"><i class="ti ti-user" style="font-size:13px;vertical-align:-1px;margin-right:4px" aria-hidden="true"></i>Student name</div>
    <select id="namaSelect" class="name-select" disabled onchange="onNama()">
      <option value="">— Select a class first —</option>
    </select>
  </div>

  <div class="field-card" id="statusCard" style="opacity:.45;pointer-events:none">
    <div class="field-label"><i class="ti ti-checks" style="font-size:13px;vertical-align:-1px;margin-right:4px" aria-hidden="true"></i>Attendance status</div>
    <div class="status-grid">
      <div class="s-tile" id="t-H" onclick="setSt('H')">
        <div class="s-tile-icon"><i class="ti ti-check" aria-hidden="true"></i></div>
        <div class="s-tile-name">Present</div>
        <div class="s-tile-desc">Attending today</div>
      </div>
      <div class="s-tile" id="t-I" onclick="setSt('I')">
        <div class="s-tile-icon"><i class="ti ti-file-description" aria-hidden="true"></i></div>
        <div class="s-tile-name">Permitted</div>
        <div class="s-tile-desc">With notice</div>
      </div>
      <div class="s-tile" id="t-S" onclick="setSt('S')">
        <div class="s-tile-icon"><i class="ti ti-heart-broken" aria-hidden="true"></i></div>
        <div class="s-tile-name">Sick</div>
        <div class="s-tile-desc">Feeling unwell</div>
      </div>
      <div class="s-tile" id="t-A" onclick="setSt('A')">
        <div class="s-tile-icon"><i class="ti ti-x" aria-hidden="true"></i></div>
        <div class="s-tile-name">Absent</div>
        <div class="s-tile-desc">No notice given</div>
      </div>
    </div>
  </div>

  <div class="submit-area">
    <div class="prog" id="prog"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="msg" id="msg"></div>
    <button class="sub-btn" id="subBtn" onclick="submit()" disabled>
      <i class="ti ti-send" aria-hidden="true"></i> Submit attendance
    </button>
  </div>

</div>

<script>
const SHEET_ID="1QSD5_w7wM-Ildr3cOhkle1yYd82FLK_vq-2XSdJEMMk";
const SHEET_NAME="Presensi";
const DATA={
  "9A":["Abqory Nararya Tyaswa P","Abyan Hadiwijaya","Abyan Rizq Adiguna","Ahmad Musthofa","Ahnaf Zaki Maulana","Al Fitto Abdurrahman","Athaillah Ervino Suyanto A","Attaya Jashenda Nugroho","Bimo Mukti Sejati","Briega Afsar Arsenio A","Faiz Jamil Ardhana Putra","Galang Jalu Massendi","Hafiz Nealson Putra Denza","Indra Winata","Khaifat Athallah Wibowo","Laksita Javas Kayana A","Mazaya Zukhruf Dlaifulloh","Meganza Fatheo Nitimanta","Muhammad Akbar Alifiandra","Muhammad Al Biruni Djatie","Muhammad Valent Putra A","Muhammad Zakiy Zidane N","Sandiaga","Zulfa Zulfigar","Muhammad Diego Rafa N","Rafi Arga Saputra"],
  "9B":["Ahmad Nayaka Rif'at Zakaria","Ahsan Fatihuddin Fawwas P","Akram Seno Adhi","Al Ghifariel Prabhaswara","Arden Yudha Damara","Arjuan Nur Ihwan","Arya Langit Ramadhan","Aslam Abdurrohman Furqoni","Asyam Nafi' Mumtazy R","Avicena Ramadhan El Rumi","Danendra Sholahudin Malik","Dzaka Rizqi Aziyad","Dzaky Farrel Khalfani","Fadhil Pradana","Firdaus Rahmat Arnol","Ghavan Candra Perdana","Muhammad Alif Alfurqon","Muhammad Alif Hakim","Muhamad Fadhil Wibowo","Muhammad Hanif Syafar L","Musyaffa 'Abdurrahman H A","Nabil Fawwaz Raihan","Nakhlah Fathan Ghaisan","Prabu Faiz Azam Permana","Raihan Zaky Al Faza","Rakan Bara Putra Ramadan","Raysha Arya Satya Naryama G","Sawung Dhimas Indra Jati","Rayhan Hafid Abdillah","Altamis Wafiy Ahmad","Dylan Albin Zaidaan","Mohammad Azka Aflah","Maulana Faathir Al Bar"],
  "9C":["Ahsan Rajendra Wibowo","Alakay Asmaul Fakiha","Arfian Fadli Setiawan","Asyraf Putra Yusra","Danish Marcello Alan","Dzacky Hafidz Chandra A","Fahreza Rafif Arkana","Fakhri Ahza Seno Adi N","Fathan Aryasatya Wijaya","Fatih Andira Putra","Ferry Setiawan","Franklin Garrick Rafif A","Ghavin Candra Paundra","Helmy Kotarou Putra A","Isnan Arsyad Maulana Hebat","Ivanza Amirul Yusuf","Khairan Athaya Wibowo","Khalaf Faith Pradyatama","Muhammad Rafasya Alvaro A","Muzhaffar Faiq Abdillah","Nuh Abdulbar","Rihalulqalbi Popalia","Thomi Eric Rahmadi","Vicky Harlan Aldiansyah","Yudhistira Abrar Purwono","Zacky Raditya Perdana","Muhammad Velino","Ibrahim Kholilulloh"],
  "9E":["Alisha Nursyifa","Amelya Nasya Putri","Anandita Zahra","Andi Nahda Athsilah","Arum Aufa Azizah","Asha Reina Ghaisani","Ashfa Muttaqina","Athaya Dhany Latifa","Audrey Zhafira Nugroho","Dinda Fatih Sahira","Fadhila Amalia","Faiha Neysa Lubna Indarvy","Fairuz Nawwar Fauziyah","Filza Shaista Armanda","Inas Alfathunnisa Azzahra","Isma Azizah Hanafi","Janeeta Aribah Zul Husni","Jenar Khalisa Sakhi","Magdalena Callista Hillary","Miftahul Khoiriyah R","Nadia Raihana","Nafisah Jinan 'Ismah Mimosa","Nasywa Aura Asyifa","Nayara Farraisha Silmi","Nayla Annashwa Adhiagsa","Princess Cleo Samantha K","Putri Siti Amarra","Qaishara Humaira","Qonita Qurrota A'yun N H","Queensha Khalila Ramadhani","Radita Azka Justitia","Shaabriyya Kirani Aamira R","Tsaniya Hurin Mukhtar","Wahida Nailiya","Wilya Saka Akbar Agustia"],
  "9F":["Adzkia Nararya Paramudita","Afifah Khoirunnisa","Aina Shoumi Latifa","Aisyah Mufidatul Yusra","Aliya Mumtaza","Amira Nayla Hafisa","Arezti Hanan Hapsari","Arsyabilla Putri Allifah","Attalea Chelsea Fahira","Azimah Khoirunnisa","Azka Felicia Binar V","Carrisa El Ghaniya F","Fatimah Az-Zahra Sutapa","Fidelia Belisya Kurniantoro","Haifa Aqila Husnina","Hasna Kamila Putri","Keysa Zafra Aqila","Keysha Bilqis Salsabila","Morenza Davia Aulia Putri","Mufidati Aliya Keumala","Nabiela Fithria","Nabila Talita Rafifah","Nadhifa Zahra Cantika Putri","Nafeeza Naya Regina Kusuma","Nindika Violeta Miftahul A","Nismara Kaniya Setiyono","Niswah Mustaniiroh","Safira Eka Putri Meylani","Syakira Amalia Farhani","Tursina Fildza Qurrotal'ain","Zahra Nadia Putri","Zivana Aurora Bintang M","Zivarra Githa Savitri","Aurora Hardira Daniswara"]
};

let role="Student",kelas="",nama="",status="";
const now=new Date();

document.getElementById("datePill").innerHTML=
  now.toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"})+"<br>"+
  now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});

function setRole(r){
  role=r;
  document.getElementById("rS").className="r-btn"+(r==="Student"?" on":"");
  document.getElementById("rP").className="r-btn"+(r==="Parent"?" on":"");
}

function unlock(id){
  const el=document.getElementById(id);
  el.style.opacity="1";el.style.pointerEvents="auto";
}
function lock(id){
  const el=document.getElementById(id);
  el.style.opacity=".45";el.style.pointerEvents="none";
}

function onKelas(){
  kelas=document.getElementById("kelasSelect").value;
  nama="";status="";
  clearMsg();resetTiles();
  const sel=document.getElementById("namaSelect");
  if(kelas&&DATA[kelas]){
    sel.innerHTML="<option value=''>— Select student —</option>";
    DATA[kelas].forEach((n,i)=>{
      const o=document.createElement("option");
      o.value=n;o.textContent=(i+1)+". "+n;sel.appendChild(o);
    });
    sel.disabled=false;
    unlock("nameCard");
  } else {
    sel.innerHTML="<option value=''>— Select a class first —</option>";
    sel.disabled=true;
    lock("nameCard");
  }
  lock("statusCard");
  checkReady();
}

function onNama(){
  nama=document.getElementById("namaSelect").value;
  status="";clearMsg();resetTiles();
  if(nama){unlock("statusCard");}else{lock("statusCard");}
  checkReady();
}

function setSt(s){
  status=s;
  ["H","I","S","A"].forEach(k=>{
    document.getElementById("t-"+k).className="s-tile"+(s===k?" sel-"+k:"");
  });
  checkReady();
}

function resetTiles(){
  ["H","I","S","A"].forEach(k=>{document.getElementById("t-"+k).className="s-tile";});
}

function checkReady(){
  document.getElementById("subBtn").disabled=!(kelas&&nama&&status);
}

function showMsg(txt,type){
  const el=document.getElementById("msg");
  el.textContent=txt;el.className="msg "+type;el.style.display="block";
}
function clearMsg(){document.getElementById("msg").style.display="none";}
function setProg(p){
  const bar=document.getElementById("prog"),fill=document.getElementById("progFill");
  if(p===null){bar.style.display="none";fill.style.width="0%";}
  else{bar.style.display="block";fill.style.width=p+"%";}
}

async function submit(){
  const btn=document.getElementById("subBtn");
  btn.disabled=true;clearMsg();setProg(10);
  showMsg("Connecting to Google Sheets…","wait");

  const tgl=now.toLocaleDateString("en-GB",{day:"2-digit",month:"2-digit",year:"numeric"});
  const jam=now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
  const no=DATA[kelas]?DATA[kelas].indexOf(nama)+1:"-";
  const label={"H":"Present","I":"Permitted","S":"Sick","A":"Absent"}[status];
  const row=[tgl,jam,kelas,role,String(no),nama,status,label];

  try{
    setProg(35);
    const r1=await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(SHEET_NAME+"!A:A")}`,
      {headers:{"Content-Type":"application/json"}}
    );
    if(!r1.ok){
      showMsg(r1.status===401||r1.status===403?"Access denied. Share the sheet with 'Anyone with link — Editor'.":"Could not reach spreadsheet. Check your connection.","err");
      setProg(null);btn.disabled=false;return;
    }
    setProg(65);showMsg("Saving your record…","wait");
    const d=await r1.json();
    const last=(d.values||[]).length;
    const startRow=last===0?1:last+1;
    const toWrite=last===0?[["Date","Time","Class","Role","No.","Student Name","Code","Status"],row]:[row];
    const range=`${SHEET_NAME}!A${startRow}`;
    const r2=await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`,
      {method:"PUT",headers:{"Content-Type":"application/json"},
       body:JSON.stringify({range,majorDimension:"ROWS",values:toWrite})}
    );
    if(!r2.ok){
      const e=await r2.json();
      showMsg("Save failed: "+(e.error&&e.error.message||"Try again."),"err");
      setProg(null);btn.disabled=false;return;
    }
    setProg(100);
    setTimeout(()=>{
      setProg(null);
      showMsg("Attendance submitted for "+nama+"!","ok");
      status="";resetTiles();
      document.getElementById("namaSelect").value="";
      nama="";lock("statusCard");
      btn.disabled=false;
    },400);
  }catch(e){
    showMsg("Error: "+e.message,"err");
    setProg(null);btn.disabled=false;
  }
}
</script>
